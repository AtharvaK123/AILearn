<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — AILearn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .leaderboard-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 8% 6rem;
  }

  /* ── TABS ── */
  .lb-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    background: var(--bg1);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 0.4rem;
    width: fit-content;
  }
  .lb-tab {
    background: none;
    border: none;
    color: var(--text3);
    font-family: var(--font-m);
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.45rem 1rem;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .lb-tab.active { background: var(--accent); color: white; }
  .lb-tab:hover:not(.active) { color: var(--text1); }

  /* ── PODIUM ── */
  .podium {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 2.5rem;
    padding: 0 1rem;
  }
  .podium-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    flex: 1;
    max-width: 180px;
  }
  .podium-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 1.25rem;
    font-weight: 700;
    font-family: var(--font-d);
    color: white;
    border: 2px solid transparent;
    flex-shrink: 0;
  }
  .podium-slot:nth-child(1) .podium-avatar { border-color: var(--gold); background: linear-gradient(135deg, #FFB84D, #FF8C00); }
  .podium-slot:nth-child(2) .podium-avatar { border-color: var(--text3); background: linear-gradient(135deg, #5A6070, #3A4050); }
  .podium-slot:nth-child(3) .podium-avatar { border-color: #CD7F32; background: linear-gradient(135deg, #CD7F32, #8B4513); }
  .podium-name { font-family: var(--font-d); font-size: 0.85rem; font-weight: 600; color: var(--text0); }
  .podium-xp   { font-family: var(--font-m); font-size: 0.7rem; color: var(--gold); }
  .podium-base {
    width: 100%;
    border-radius: 10px 10px 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-d);
    font-size: 1.1rem;
    font-weight: 800;
    color: rgba(255,255,255,0.5);
    border: 1px solid var(--border2);
    border-bottom: none;
  }
  .podium-slot:nth-child(1) .podium-base { height: 80px; background: rgba(255,184,77,0.12); }
  .podium-slot:nth-child(2) .podium-base { height: 56px; background: rgba(90,96,112,0.12); }
  .podium-slot:nth-child(3) .podium-base { height: 44px; background: rgba(205,127,50,0.12); }

  /* ── TABLE ── */
  .lb-table {
    background: var(--bg1);
    border: 1px solid var(--border2);
    border-radius: 14px;
    overflow: hidden;
  }
  .lb-table-header {
    display: grid;
    grid-template-columns: 60px 1fr 120px 100px 80px;
    padding: 0.75rem 1.25rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border2);
    font-family: var(--font-m);
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
  }
  .lb-row {
    display: grid;
    grid-template-columns: 60px 1fr 120px 100px 80px;
    padding: 0.9rem 1.25rem;
    border-bottom: 1px solid var(--border2);
    align-items: center;
    transition: background 0.15s;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: var(--bg2); }
  .lb-row.me { background: rgba(108,127,255,0.07); }

  .lb-rank {
    font-family: var(--font-d);
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text3);
  }
  .lb-rank.gold   { color: var(--gold); }
  .lb-rank.silver { color: #8892AA; }
  .lb-rank.bronze { color: #CD7F32; }

  .lb-user {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .lb-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--cyan));
    display: grid;
    place-items: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: white;
    font-family: var(--font-d);
    flex-shrink: 0;
  }
  .lb-username { font-family: var(--font-d); font-size: 0.88rem; font-weight: 600; color: var(--text0); }
  .lb-handle   { font-family: var(--font-m); font-size: 0.65rem; color: var(--text3); margin-top: 0.1rem; }

  .lb-xp {
    font-family: var(--font-m);
    font-size: 0.82rem;
    color: var(--gold);
    font-weight: 600;
  }
  .lb-lessons { font-family: var(--font-m); font-size: 0.78rem; color: var(--text2); }
  .lb-streak  { font-family: var(--font-m); font-size: 0.78rem; color: var(--coral); }

  .you-badge {
    display: inline-block;
    font-family: var(--font-m);
    font-size: 0.6rem;
    background: rgba(108,127,255,0.15);
    color: var(--accent2);
    border: 1px solid var(--border);
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    margin-left: 0.4rem;
    letter-spacing: 0.05em;
  }

  .lb-empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text3);
    font-size: 0.88rem;
  }

  @media (max-width: 640px) {
    .lb-table-header,
    .lb-row { grid-template-columns: 48px 1fr 80px; }
    .lb-table-header > *:nth-child(4),
    .lb-table-header > *:nth-child(5),
    .lb-row > *:nth-child(4),
    .lb-row > *:nth-child(5) { display: none; }
    .podium { gap: 0.5rem; }
  }
</style>
</head>
<body>
<div class="page-wrap">

<!-- nav injected by nav.js -->

<div class="page-hero">
  <div class="page-hero-eyebrow">Global Rankings</div>
  <h1>Leaderboard</h1>
  <p>Earn XP by completing lessons to climb the global rankings. Updated in real-time.</p>
</div>

<div class="leaderboard-wrap">

  <!-- TABS -->
  <div class="lb-tabs">
    <button class="lb-tab active" onclick="setTab('global', this)">Global</button>
    <button class="lb-tab" onclick="setTab('weekly', this)">This Week</button>
    <button class="lb-tab" onclick="setTab('monthly', this)">This Month</button>
  </div>

  <!-- PODIUM (top 3) -->
  <div class="podium" id="podium">
    <!-- Rendered by JS -->
  </div>

  <!-- TABLE -->
  <div class="lb-table">
    <div class="lb-table-header">
      <div>#</div>
      <div>User</div>
      <div>XP</div>
      <div>Lessons</div>
      <div>Streak</div>
    </div>
    <div id="lb-body">
      <div class="lb-empty">Loading leaderboard…</div>
    </div>
  </div>

</div>

<!-- footer injected by nav.js -->

<script src="curriculum.js"></script>
<script src="nav.js"></script>
<script>
  // ── MOCK DATA (replace with Firebase reads) ──
  const MOCK_USERS = [
    { name: 'Aria Chen',     handle: 'ariachen',   xp: 4820, lessons: 96,  streak: 34, color: '#6C7FFF' },
    { name: 'Marcus Reid',   handle: 'marcusai',   xp: 3960, lessons: 79,  streak: 21, color: '#22D3EE' },
    { name: 'Priya Nair',    handle: 'priya_ml',   xp: 3410, lessons: 68,  streak: 15, color: '#FF6B6B' },
    { name: 'Jake Torres',   handle: 'jakeai',     xp: 2880, lessons: 57,  streak: 9,  color: '#FFB84D' },
    { name: 'Sofia Müller',  handle: 'sofiaml',   xp: 2350, lessons: 47,  streak: 7,  color: '#34D399' },
    { name: 'David Kim',     handle: 'dkim_ai',    xp: 1900, lessons: 38,  streak: 5,  color: '#8B9FFF' },
    { name: 'Lena Ivanova',  handle: 'lenai',      xp: 1540, lessons: 30,  streak: 3,  color: '#22D3EE' },
    { name: 'Omar Hassan',   handle: 'omarh',      xp: 1200, lessons: 24,  streak: 2,  color: '#FFB84D' },
    { name: 'Yuki Tanaka',   handle: 'yukiai',     xp: 890,  lessons: 17,  streak: 1,  color: '#FF6B6B' },
    { name: 'Emma Walsh',    handle: 'emmawalsh',  xp: 640,  lessons: 12,  streak: 1,  color: '#34D399' },
  ];

  let currentTab = 'global';

  function setTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.lb-tab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderLeaderboard();
  }

  function renderLeaderboard() {
    // In real app, fetch from Firebase filtered by time range
    const users = [...MOCK_USERS].sort((a, b) => b.xp - a.xp);
    renderPodium(users.slice(0, 3));
    renderTable(users);
  }

  function renderPodium(top3) {
    const order = [top3[1], top3[0], top3[2]]; // silver, gold, bronze visual order
    const ranks = [2, 1, 3];
    const medals = ['🥈', '🥇', '🥉'];

    document.getElementById('podium').innerHTML = order.map((u, i) => `
      <div class="podium-slot">
        <div class="podium-avatar">${u.name[0]}</div>
        <div class="podium-name">${u.name}</div>
        <div class="podium-xp">${u.xp.toLocaleString()} XP</div>
        <div class="podium-base">${medals[i]}</div>
      </div>`).join('');
  }

  function renderTable(users) {
    const rankClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    document.getElementById('lb-body').innerHTML = users.map((u, i) => `
      <div class="lb-row">
        <div class="lb-rank ${rankClass(i)}">${i < 3 ? ['🥇','🥈','🥉'][i] : `#${i+1}`}</div>
        <div class="lb-user">
          <div class="lb-avatar" style="background: linear-gradient(135deg, ${u.color}, ${u.color}88)">${u.name[0]}</div>
          <div>
            <div class="lb-username">${u.name}</div>
            <div class="lb-handle">@${u.handle}</div>
          </div>
        </div>
        <div class="lb-xp">${u.xp.toLocaleString()} XP</div>
        <div class="lb-lessons">${u.lessons} done</div>
        <div class="lb-streak">🔥 ${u.streak}</div>
      </div>`).join('');
  }

  renderLeaderboard();

  // ── TODO: Replace MOCK_USERS with Firebase Realtime DB read ──
  // ── Example:
  //   const ref = firebase.database().ref('users');
  //   ref.orderByChild('xp').limitToLast(100).once('value', snap => {
  //     const users = [];
  //     snap.forEach(child => users.unshift({ ...child.val(), uid: child.key }));
  //     renderPodium(users.slice(0, 3));
  //     renderTable(users);
  //   });
</script>
</body>
</html>
