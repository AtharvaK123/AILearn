<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academies — AILearn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
    align-items: center;
  }
  .filter-btn {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: var(--font-m);
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    padding: 0.4rem 0.9rem;
    border-radius: 100px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .filter-btn:hover,
  .filter-btn.active { border-color: var(--accent); color: var(--accent2); background: rgba(108,127,255,0.08); }

  /* Detail panel */
  .academy-detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(7,9,15,0.7);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .academy-detail-overlay.open { display: flex; }

  .academy-detail-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 600px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 2rem;
    position: relative;
    animation: fadeUp 0.25s ease;
  }
  .detail-close {
    position: absolute;
    top: 1.25rem; right: 1.25rem;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text2);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    display: grid;
    place-items: center;
    transition: color 0.2s;
  }
  .detail-close:hover { color: var(--text0); }

  .detail-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .detail-name { font-family: var(--font-d); font-size: 1.4rem; font-weight: 700; color: var(--text0); letter-spacing: -0.02em; margin-bottom: 0.4rem; }
  .detail-desc { color: var(--text2); font-size: 0.9rem; line-height: 1.7; margin-bottom: 1.5rem; }

  .detail-section-title {
    font-family: var(--font-m);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 0.65rem;
    margin-top: 1.25rem;
  }
  .detail-list { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
  .detail-list li {
    font-size: 0.84rem;
    color: var(--text1);
    padding-left: 1rem;
    position: relative;
  }
  .detail-list li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-size: 0.7rem; top: 0.15rem; }

  .detail-skills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .skill-chip {
    font-family: var(--font-m);
    font-size: 0.68rem;
    background: rgba(108,127,255,0.1);
    color: var(--accent2);
    border: 1px solid var(--border);
    padding: 0.25rem 0.65rem;
    border-radius: 6px;
    letter-spacing: 0.04em;
  }

  .detail-actions { display: flex; gap: 0.75rem; margin-top: 1.75rem; }

  .modules-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .module-row {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .module-title { font-family: var(--font-d); font-size: 0.85rem; font-weight: 600; color: var(--text0); }
  .module-meta { font-family: var(--font-m); font-size: 0.68rem; color: var(--text3); }
</style>
</head>
<body>
<div class="page-wrap">

  <!-- nav injected by nav.js -->

  <div class="page-hero">
    <div class="page-hero-eyebrow">The Full Curriculum</div>
    <h1>16 Academies.<br>One Mastery Path.</h1>
    <p>Each academy is a self-contained discipline with structured lessons, quizzes, and projects. Prerequisites connect them into a coherent journey from beginner to expert.</p>
  </div>

  <div style="padding: 0 8% 6rem; max-width: 1400px; margin: 0 auto;">

    <!-- Filter bar -->
    <div class="filter-bar">
      <span class="level-legend-label">Filter:</span>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="beginner">Beginner</button>
      <button class="filter-btn" data-filter="intermediate">Intermediate</button>
      <button class="filter-btn" data-filter="advanced">Advanced</button>
      <button class="filter-btn" data-filter="expert">Expert</button>
    </div>

    <!-- Legend -->
    <div class="level-legend">
      <span class="level-legend-label">Difficulty:</span>
      <span class="ac-diff diff-beginner">Beginner</span>
      <span class="ac-diff diff-intermediate">Intermediate</span>
      <span class="ac-diff diff-advanced">Advanced</span>
      <span class="ac-diff diff-expert">Expert</span>
    </div>

    <div class="academies-grid" id="academies-grid"></div>
  </div>

</div>

<!-- Detail panel overlay -->
<div class="academy-detail-overlay" id="detail-overlay">
  <div class="academy-detail-panel" id="detail-panel">
    <button class="detail-close" id="detail-close">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<!-- footer injected by nav.js -->

<script src="curriculum.js"></script>
<script src="nav.js"></script>
<script>
  let activeFilter = 'all';

  function renderGrid() {
    const grid = document.getElementById('academies-grid');
    const filtered = activeFilter === 'all'
      ? ACADEMIES
      : ACADEMIES.filter(a => a.difficulty === activeFilter);

    grid.innerHTML = filtered.map(a => {
      const prereqHTML = a.prereqs[0] === 'None'
        ? `<span class="prereq-tag none">No prereqs</span>`
        : a.prereqs.map(p => `<span class="prereq-tag">${p}</span>`).join('');

      return `
        <div class="academy-card" data-id="${a.id}">
          <div class="ac-header">
            <div class="ac-icon">${a.icon}</div>
            <span class="ac-diff diff-${a.difficulty}">${a.difficulty}</span>
          </div>
          <div class="ac-name">${a.name}</div>
          <div class="ac-desc">${a.description || ''}</div>
          <div class="ac-footer">
            <div class="ac-lessons">${a.lessons} lessons</div>
            <div class="ac-prereqs">${prereqHTML}</div>
          </div>
        </div>`;
    }).join('');

    // Attach click listeners
    grid.querySelectorAll('.academy-card').forEach(card => {
      card.addEventListener('click', () => openDetail(card.dataset.id));
    });
  }

  function openDetail(id) {
    const a = ACADEMIES.find(x => x.id === id);
    if (!a) return;

    const prereqHTML = a.prereqs[0] === 'None'
      ? `<span class="prereq-tag none">No prerequisites</span>`
      : a.prereqs.map(p => `<span class="prereq-tag">${p}</span>`).join('');

    const objectivesHTML = a.objectives?.length
      ? `<div class="detail-section-title">What You'll Learn</div>
         <ul class="detail-list">${a.objectives.map(o => `<li>${o}</li>`).join('')}</ul>`
      : '';

    const skillsHTML = a.skills?.length
      ? `<div class="detail-section-title">Skills Gained</div>
         <div class="detail-skills">${a.skills.map(s => `<span class="skill-chip">${s}</span>`).join('')}</div>`
      : '';

    const modulesHTML = a.modules?.length
      ? `<div class="detail-section-title">Modules</div>
         <div class="modules-list">
           ${a.modules.map(m => `
             <div class="module-row">
               <div>
                 <div class="module-title">${m.title}</div>
                 <div style="font-size:0.78rem; color:var(--text3); margin-top:0.2rem;">${m.desc || ''}</div>
               </div>
               <div class="module-meta">${m.time || ''}</div>
             </div>`).join('')}
         </div>`
      : '';

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-icon">${a.icon}</div>
      <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:0.5rem;">
        <div class="detail-name">${a.name}</div>
        <span class="ac-diff diff-${a.difficulty}">${a.difficulty}</span>
      </div>
      <div class="detail-desc">${a.description || ''}</div>
      <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.5rem;">
        <span class="stat-pill"><strong>${a.lessons}</strong> lessons</span>
        <span style="display:flex;gap:0.3rem;align-items:center;">${prereqHTML}</span>
      </div>
      ${objectivesHTML}
      ${skillsHTML}
      ${modulesHTML}
      <div class="detail-actions">
        <a href="learn.html?academy=${a.id}" class="btn-primary">Start Academy →</a>
        <button class="btn-ghost" onclick="closeDetail()">Close</button>
      </div>`;

    document.getElementById('detail-overlay').classList.add('open');
  }

  function closeDetail() {
    document.getElementById('detail-overlay').classList.remove('open');
  }

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderGrid();
    });
  });

  document.getElementById('detail-close').addEventListener('click', closeDetail);
  document.getElementById('detail-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('detail-overlay')) closeDetail();
  });

  // Open detail if ?id= param present
  document.addEventListener('DOMContentLoaded', () => {
    renderGrid();
    const params = new URLSearchParams(window.location.search);
    if (params.get('id')) openDetail(params.get('id'));
  });
</script>
</body>
</html>
